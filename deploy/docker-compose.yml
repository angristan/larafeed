services:
    init:
        image: alpine:3.21
        volumes:
            - ./.secrets:/secrets
        entrypoint: ["sh", "-c"]
        command:
            - |
                if [ ! -f /secrets/.env.generated ]; then
                    echo "Generating secrets for first-time setup..."
                    SESSION_SECRET=$$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 32 | head -n 1)
                    IMGPROXY_KEY=$$(cat /dev/urandom | tr -dc 'a-f0-9' | fold -w 128 | head -n 1)
                    IMGPROXY_SALT=$$(cat /dev/urandom | tr -dc 'a-f0-9' | fold -w 128 | head -n 1)
                    cat > /secrets/.env.generated << EOF
                SESSION_SECRET=$$SESSION_SECRET
                IMGPROXY_KEY=$$IMGPROXY_KEY
                IMGPROXY_SALT=$$IMGPROXY_SALT
                EOF
                    echo "Secrets generated and saved to .secrets/.env.generated"
                else
                    echo "Secrets already exist, skipping generation."
                fi

    app:
        image: ghcr.io/angristan/larafeed:latest
        env_file:
            - .env.compose
            - path: .env.compose.local
              required: false
            - path: ./.secrets/.env.generated
              required: false
        ports:
            - "8000:3000"
        depends_on:
            init:
                condition: service_completed_successfully
            postgres:
                condition: service_healthy
        networks:
            - internal_network
            - external_network

    postgres:
        image: postgres:17-alpine
        environment:
            POSTGRES_DB: larafeed
            POSTGRES_USER: larafeed
            POSTGRES_PASSWORD: larafeed
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "larafeed"]
            interval: 5s
            timeout: 3s
            retries: 5
        volumes:
            - postgres-data:/var/lib/postgresql/data
        networks:
            - internal_network

    imgproxy:
        image: ghcr.io/imgproxy/imgproxy:latest
        env_file:
            - .env.compose
            - path: .env.compose.local
              required: false
            - path: ./.secrets/.env.generated
              required: false
        volumes:
            - ./.secrets:/secrets
        entrypoint: ["sh", "-c"]
        command:
            - |
                if [ -f /secrets/.env.generated ]; then export $$(cat /secrets/.env.generated | xargs); fi
                /usr/local/bin/imgproxy
        depends_on:
            init:
                condition: service_completed_successfully
        ports:
            - "127.0.0.1:8080:8080"
        networks:
            - external_network

networks:
    external_network:
    internal_network:
        internal: true

volumes:
    postgres-data:
