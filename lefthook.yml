pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,tsx}"
      run: npm run lint-check
    typecheck:
      glob: "*.{ts,tsx}"
      run: npm run typecheck
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD
    go-test:
      glob: "*.go"
      run: go test -short ./...
