version: 2
updates:
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 20
    schedule:
      interval: weekly
    groups:
      mantine:
        patterns:
          - "@mantine/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      inertia:
        patterns:
          - "@inertiajs/*"
      minor-dependencies:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
        exclude-patterns:
          - "@mantine/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@inertiajs/*"

  - package-ecosystem: gomod
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
    groups:
      minor-dependencies:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /deploy
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
